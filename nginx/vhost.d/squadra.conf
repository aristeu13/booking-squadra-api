# nginx-proxy include for the Squadra API host.
#
# This file is bind-mounted into /etc/nginx/vhost.d/${API_DOMAIN}. nginx-proxy
# `include`s it INSIDE the auto-generated `server { ... }` block, so the
# directives below apply at server scope (alongside the SSL/Let's Encrypt
# config that nginx-proxy emits automatically).
#
# Purpose: enforce mTLS only on the /webhook/pix endpoint used by Efí Pay for
# PIX webhook callbacks (Central Bank requirement). The rest of the API
# remains accessible without a client certificate.

# Trust chain that nginx will use to verify Efí Pay's webhook client cert.
# Bind-mounted from ./nginx/certs/ — see docker-compose.yml. Currently
# pointing at the homolog chain for testing; switch to efipay-prod-ca.crt
# when moving to production EfiPay credentials.
ssl_client_certificate /etc/nginx/certs/efipay-homolog-ca.crt;

# `optional` — request a client cert during the TLS handshake but do not
# reject the connection if one is missing or invalid. Per-location checks
# below enforce verification where it actually matters.
ssl_verify_client optional;

# Efí Pay PIX webhook — mTLS required.
#
# Public URL matches the Spring controller path 1:1, so this block does no
# URL rewriting — nginx forwards /api/v1/efipay-webhook/pix straight to the
# upstream. Efí Pay's registration handshake expects the URL to end in /pix,
# which this path satisfies.
location ^~ /api/v1/efipay-webhook/pix {
    # Reject any caller whose TLS client cert did not verify against the
    # trust chain above. NONE = no cert presented; FAILED = cert rejected;
    # only SUCCESS lets the request through.
    if ($ssl_client_verify != SUCCESS) {
        return 400;
    }

    # No URI on proxy_pass — nginx forwards the original request path
    # unchanged to the upstream.
    proxy_pass http://booking-squadra-api:8080;
    proxy_http_version 1.1;

    # Re-declare the standard nginx-proxy headers. Defining any
    # proxy_set_header at this scope drops everything inherited from the
    # parent context, so we restate the full set here.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # Surface the verified cert subject to the app for audit logging if it
    # ever wants to record which Efí Pay client cert delivered the event.
    proxy_set_header X-SSL-Client-DN     $ssl_client_s_dn;
    proxy_set_header X-SSL-Client-Verify $ssl_client_verify;

    # Webhook bodies are small; keep timeouts tight to surface upstream
    # hangs quickly rather than holding Efí Pay's worker.
    proxy_connect_timeout 5s;
    proxy_send_timeout    10s;
    proxy_read_timeout    10s;
}
