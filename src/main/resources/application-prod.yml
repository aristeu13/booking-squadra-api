
spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false

  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: BookingSquadraHikariCP

  mvc:
    log-resolved-exception: false

  web:
    resources:
      add-mappings: false

server:
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,application/problem+json,text/plain,text/css
    min-response-size: 1024
  http2:
    enabled: true
  tomcat:
    accept-count: 100
    threads:
      max: 200
      min-spare: 20
    max-connections: 8192
    connection-timeout: 20000
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
    whitelabel:
      enabled: false

logging:
  level:
    root: ${LOG_LEVEL_ROOT:WARN}
    com.bookingsquadra: ${LOG_LEVEL_APP:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
    org.hibernate.orm.jdbc.bind: ${LOG_LEVEL_SQL_BIND:WARN}
    org.springframework.web: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg%n"

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:false}
  scalar:
    enabled: ${SPRINGDOC_SCALAR_ENABLED:false}
