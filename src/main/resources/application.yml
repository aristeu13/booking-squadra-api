
spring:
  application:
    name: booking-squadra-api

  profiles:
    default: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/booking_squadra}
    username: ${DB_USERNAME:booking_squadra}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

  mvc:
    problemdetails:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

springdoc:
  api-docs:
    path: /api-docs
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}
  scalar:
    path: /scalar
    enabled: ${SPRINGDOC_SCALAR_ENABLED:true}
  show-actuator: false

app:
  auth:
    test-otp:
      enabled: ${TEST_OTP_ENABLED:true}
      email: ${TEST_OTP_EMAIL:test@example.com}
      phone: ${TEST_OTP_PHONE:+5511999999999}
      code: ${TEST_OTP_CODE:123456}
    google:
      client-id: ${GOOGLE_CLIENT_ID}
    phone-login:
      enabled: ${PHONE_LOGIN_ENABLED:false}
  whatsapp:
    base-url: ${WHATSAPP_BASE_URL:https://graph.facebook.com/v18.0}
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
    access-token: ${WHATSAPP_ACCESS_TOKEN:}
    otp-template-name: ${WHATSAPP_OTP_TEMPLATE_NAME:}
    otp-template-language: ${WHATSAPP_OTP_TEMPLATE_LANGUAGE:pt_BR}
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000}
  mailgun:
    api-key: ${MAILGUN_API_KEY}
    domain: ${MAILGUN_DOMAIN}
    from: ${MAILGUN_FROM:Squadra <no-reply@booking-squadra.com>}
    base-url: ${MAILGUN_BASE_URL:https://api.mailgun.net}
    otp-template: ${MAILGUN_OTP_TEMPLATE:019dcff1-fc35-7b88-a0d7-c87d728bc04e}
    template-payment-confirmed: ${MAILGUN_TEMPLATE_PAYMENT_CONFIRMED:019e04f3-4588-7c7b-b21e-8d640f57c2af}
    template-payment-refund-in-progress: ${MAILGUN_TEMPLATE_PAYMENT_REFUND_IN_PROGRESS:019e04f4-de15-7017-997d-d1c40942e58a}
    template-payment-refunded: ${MAILGUN_TEMPLATE_PAYMENT_REFUNDED:019e04f7-3bab-7bdb-a393-ae430cd2855f}
    template-payment-refund-denied: ${MAILGUN_TEMPLATE_PAYMENT_REFUND_DENIED:019e04f8-b89d-714e-b552-2c300042e7d2}
    template-prereservation-cancelled: ${MAILGUN_TEMPLATE_PRERESERVATION_CANCELLED:019e04fe-598a-7ec1-aa4b-7beceeca5a1f}
  payments:
    webhook:
      token: ${PAYMENTS_WEBHOOK_TOKEN}
    asaas:
      base-url: ${ASAAS_BASE_URL:https://api-sandbox.asaas.com/v3}
      access-token: ${ASAAS_ACCESS_TOKEN}
      booking-grace-minutes: ${ASAAS_BOOKING_GRACE_MINUTES:3}
      payment-window-minutes: ${ASAAS_PAYMENT_WINDOW_MINUTES:10}
      due-days: ${ASAAS_DUE_DAYS:1}
      main-account-share-cents: ${ASAAS_MAIN_ACCOUNT_SHARE_CENTS:100}
