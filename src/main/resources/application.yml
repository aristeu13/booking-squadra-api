
spring:
  application:
    name: booking-squadra-api

  profiles:
    default: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/booking_squadra}
    username: ${DB_USERNAME:booking_squadra}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

  mvc:
    problemdetails:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

springdoc:
  api-docs:
    path: /api-docs
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}
  scalar:
    path: /scalar
    enabled: ${SPRINGDOC_SCALAR_ENABLED:true}
  show-actuator: false

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  mailgun:
    api-key: ${MAILGUN_API_KEY}
    domain: ${MAILGUN_DOMAIN}
    from: ${MAILGUN_FROM:Squadra <no-reply@booking-squadra.com>}
    base-url: ${MAILGUN_BASE_URL:https://api.mailgun.net}
    otp-template: ${MAILGUN_OTP_TEMPLATE:019dcff1-fc35-7b88-a0d7-c87d728bc04e}
  payments:
    webhook:
      token: ${PAYMENTS_WEBHOOK_TOKEN}
