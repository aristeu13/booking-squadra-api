services:
  postgres:
    image: postgres:16-alpine
    container_name: booking-squadra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: booking_squadra
      POSTGRES_USER: booking_squadra
      POSTGRES_PASSWORD: booking_squadra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_squadra -d booking_squadra"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
