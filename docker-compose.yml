name: booking-squadra

services:
  nginx:
    image: nginxproxy/nginx-proxy:alpine
    container_name: booking-squadra-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      DEFAULT_HOST: ${API_DOMAIN:-api.squadraplay.com}
    volumes:
      - nginx_certs:/etc/nginx/certs:ro
      - nginx_vhost:/etc/nginx/vhost.d
      - nginx_html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro

      - ./nginx/certs/certificate-chain-prod.crt:/etc/nginx/certs/efipay-prod-ca.crt:ro
      - ./nginx/certs/certificate-chain-homolog.crt:/etc/nginx/certs/efipay-homolog-ca.crt:ro

      - ./nginx/vhost.d/squadra.conf:/etc/nginx/vhost.d/${API_DOMAIN}:ro
    networks:
      - proxy
    deploy:
      resources:
        limits:
          memory: 256m

  letsencrypt:
    image: nginxproxy/acme-companion:latest
    container_name: booking-squadra-letsencrypt
    restart: unless-stopped
    depends_on:
      - nginx
    environment:
      DEFAULT_EMAIL: ${LETSENCRYPT_EMAIL:-admin@squadraplay.com}
      NGINX_PROXY_CONTAINER: booking-squadra-nginx
    volumes:
      - nginx_certs:/etc/nginx/certs
      - nginx_vhost:/etc/nginx/vhost.d
      - nginx_html:/usr/share/nginx/html
      - acme_data:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    deploy:
      resources:
        limits:
          memory: 256m

  postgres:
    image: postgres:16-alpine
    container_name: booking-squadra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-booking_squadra}
      POSTGRES_USER: ${POSTGRES_USER:-booking_squadra}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set (export it or pass --env-file)}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-booking_squadra} -d ${POSTGRES_DB:-booking_squadra}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m

  app:
    image: ${AWS_ACCOUNT_ID:?AWS_ACCOUNT_ID required}.dkr.ecr.${AWS_REGION:?AWS_REGION required}.amazonaws.com/${ECR_REPOSITORY:?ECR_REPOSITORY required}:${APP_VERSION:?APP_VERSION required}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booking-squadra-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}

      VIRTUAL_HOST: ${API_DOMAIN:-api.squadraplay.com}
      VIRTUAL_PORT: 8080
      LETSENCRYPT_HOST: ${API_DOMAIN:-api.squadraplay.com}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-admin@squadraplay.com}

      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-booking_squadra}
      DB_USERNAME: ${POSTGRES_USER:-booking_squadra}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_POOL_MIN: ${DB_POOL_MIN:-5}
      DB_CONNECTION_TIMEOUT_MS: ${DB_CONNECTION_TIMEOUT_MS:-30000}

      SERVER_PORT: 8080

      TEST_OTP_ENABLED: ${TEST_OTP_ENABLED:-true}
      TEST_OTP_EMAIL: ${TEST_OTP_EMAIL:-test@example.com}
      TEST_OTP_CODE: ${TEST_OTP_CODE:-123456}

      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (>=32 bytes for HS256)}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-2592000000}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID must be set}

      MAILGUN_API_KEY: ${MAILGUN_API_KEY:?MAILGUN_API_KEY must be set}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-mail.squadraplay.com}
      MAILGUN_FROM: ${MAILGUN_FROM:-Squadra <naoresponder@mail.squadraplay.com>}
      MAILGUN_BASE_URL: ${MAILGUN_BASE_URL:-https://api.mailgun.net}
      MAILGUN_OTP_TEMPLATE: ${MAILGUN_OTP_TEMPLATE:-019dcff1-fc35-7b88-a0d7-c87d728bc04e}
      MAILGUN_TEMPLATE_PAYMENT_CONFIRMED: ${MAILGUN_TEMPLATE_PAYMENT_CONFIRMED:-019e04f3-4588-7c7b-b21e-8d640f57c2af}
      MAILGUN_TEMPLATE_PAYMENT_REFUND_IN_PROGRESS: ${MAILGUN_TEMPLATE_PAYMENT_REFUND_IN_PROGRESS:-019e04f4-de15-7017-997d-d1c40942e58a}
      MAILGUN_TEMPLATE_PAYMENT_REFUNDED: ${MAILGUN_TEMPLATE_PAYMENT_REFUNDED:-019e04f7-3bab-7bdb-a393-ae430cd2855f}
      MAILGUN_TEMPLATE_PAYMENT_REFUND_DENIED: ${MAILGUN_TEMPLATE_PAYMENT_REFUND_DENIED:-019e04f8-b89d-714e-b552-2c300042e7d2}
      MAILGUN_TEMPLATE_PRERESERVATION_CANCELLED: ${MAILGUN_TEMPLATE_PRERESERVATION_CANCELLED:-019e04fe-598a-7ec1-aa4b-7beceeca5a1f}

      PAYMENTS_WEBHOOK_TOKEN: ${PAYMENTS_WEBHOOK_TOKEN:?PAYMENTS_WEBHOOK_TOKEN must be set}

      ASAAS_BASE_URL: ${ASAAS_BASE_URL:-https://api.asaas.com/v3}
      ASAAS_ACCESS_TOKEN: ${ASAAS_ACCESS_TOKEN:?ASAAS_ACCESS_TOKEN must be set}
      ASAAS_PAYMENT_WINDOW_MINUTES: ${ASAAS_PAYMENT_WINDOW_MINUTES:-10}
      ASAAS_DUE_DAYS: ${ASAAS_DUE_DAYS:-1}
      ASAAS_FULL_REFUND_FEE_PERCENT: ${ASAAS_FULL_REFUND_FEE_PERCENT:-10}

      SPRINGDOC_API_DOCS_ENABLED: ${SPRINGDOC_API_DOCS_ENABLED:-false}
      SPRINGDOC_SWAGGER_UI_ENABLED: ${SPRINGDOC_SWAGGER_UI_ENABLED:-false}
      SPRINGDOC_SCALAR_ENABLED: ${SPRINGDOC_SCALAR_ENABLED:-false}

      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-WARN}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-INFO}
      LOG_LEVEL_SQL: ${LOG_LEVEL_SQL:-WARN}
      LOG_LEVEL_SQL_BIND: ${LOG_LEVEL_SQL_BIND:-WARN}

      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75 -XX:+ExitOnOutOfMemoryError -Djava.security.egd=file:/dev/./urandom -Duser.timezone=UTC}
    networks:
      - backend
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1g

networks:
  proxy:
    driver: bridge
  backend:
    driver: bridge

volumes:
  nginx_certs:
    driver: local
  nginx_vhost:
    driver: local
  nginx_html:
    driver: local
  acme_data:
    driver: local
  postgres_data:
    driver: local
